<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoStride - Gamified Green Mobility</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="root"></div>
    
    <!-- React Application Logic -->
    <script type="text/babel">
const App = () => {
  const [currentPage, setCurrentPage] = React.useState('home');

  const renderHome = () => (
    <div>
      <header className="hero-section">
        <img src="tree.jpg" alt="Minimalist Tree" className="hero-image" />
        <h1>EcoStride</h1>
        <p className="subtitle">
          Turn Every Step & Pedal into City Conquest and Real Rewards. Gamified green mobility for a smarter city.
        </p>
      </header>
      
      <main className="container">
        <h2 className="section-title">Why EcoStride?</h2>
        <p className="intro-text">
          Traditional "low-carbon" slogans lack intrinsic motivation. Local merchants struggle with high foot-traffic acquisition costs, and urban congestion remains high. EcoStride connects gamified exploration, local commerce, and civic engagement to drive genuine behavioral change.
        </p>
        
        <h2 className="section-title">Explore Features</h2>
        <div className="features-grid">
          <div className="feature-card" onClick={() => alert("Avatar & Customization feature coming soon!")}>
            <div className="feature-icon">🚴‍♂️</div>
            <h3>Avatar & Worldview</h3>
            <p>Evolve your "Carbon-Neutral Sprite" as your carbon reduction grows. Unlock landmarks and trail signposts.</p>
          </div>
          <div className="feature-card" onClick={() => alert("Territory Conquest feature coming soon!")}>
            <div className="feature-icon">🗺️</div>
            <h3>Territory Conquest</h3>
            <p>Join guilds, plant carbon trees, and claim "Oasis Zones" for exclusive merchant discounts.</p>
          </div>
          <div className="feature-card" onClick={() => alert("Seasonal Events feature coming soon!")}>
            <div className="feature-icon">🏅</div>
            <h3>Marathons & Trophies</h3>
            <p>Participate in virtual green marathons and collect handcrafted digital 3D medals.</p>
          </div>
          <div className="feature-card" onClick={() => alert("Civic Bounty feature coming soon!")}>
            <div className="feature-icon">📸</div>
            <h3>Civic Bounty</h3>
            <p>Report urban issues through geo-tagging to earn Eco-Coins and help local government maintain the city.</p>
          </div>
          <div className="feature-card" onClick={() => alert("Green Economy feature coming soon!")}>
            <div className="feature-icon">💰</div>
            <h3>Green Economy</h3>
            <p>Redeem Eco-Coins for merchant vouchers, transit discounts, or sponsor raffle entries.</p>
          </div>
        </div>
      </main>
    </div>
  );

  const renderLearnMore = () => (
    <main className="container article-container">
      <button className="back-button" onClick={() => setCurrentPage('home')}>
        &larr; Back to Homepage
      </button>
      <h1 className="article-title">Learn More About EcoStride</h1>
      <div className="article-content">
        <p>
          <strong>EcoStride (EcoStride: Green Quest)</strong> is a gamified web application designed to promote green travel, with a specific focus on cycling. It functions as a highly interactive platform that combines a "green travel gamified map" with social and commercial features. Users track their cycling routes to earn "Eco-Coins," view their real-time carbon reduction, and participate in asynchronous social interactions like leaving virtual stickers on the map. Furthermore, it incorporates a "Territory Conquest" system where teams can claim different zones, and a dashboard that connects these green actions with local merchant rewards and vouchers.
        </p>

        <h3>The Environmental Issues We Are Facing Right Now</h3>
        <p>To understand the necessity of this project, we must look at the current state of global and urban mobility:</p>
        <ul>
          <li><strong>High Carbon Emissions:</strong> Transportation is the fastest-growing source of carbon dioxide (CO2) emissions globally, producing roughly 23% of the world's CO2 emissions from fuel combustion.</li>
          <li><strong>Urban Transport Inefficiency:</strong> Urban travel alone accounts for 40% of global CO2 emissions from passenger transport. As populations and incomes rise, transport demand is increasingly dominated by privately owned vehicles, which emit more carbon and consume more urban space than other modes of transit.</li>
          <li><strong>Pollution and Climate Impact:</strong> Vehicles with internal combustion engines release harmful particles and gases from their tailpipes, contributing heavily to air pollution that affects both human health and the environment. Cars also create significant noise pollution, which negatively impacts ecosystems and public well-being.</li>
          <li><strong>The Behavioral Gap:</strong> While active mobility (like walking or cycling) has practically zero carbon footprint, changing human habits is difficult. Many individuals face an "intention-action gap," where they want to reduce their car usage but struggle to commit to sustainable habits over time.</li>
        </ul>

        <h3>Why We Need EcoStride and How It Contributes</h3>
        <p>This platform bridges the gap between environmental necessity and human behavior by making sustainability interactive and rewarding.</p>
        <ul>
          <li><strong>Zero-Emission Substitution:</strong> Bicycles are human-powered, do not rely on gasoline, and produce absolutely zero tailpipe emissions. Choosing a bike over a car for just one trip a day can reduce an average person's transportation carbon emissions by 67%. The application directly facilitates this shift for short, everyday commutes.</li>
          <li><strong>Solving the Motivation Problem:</strong> Behavioral science indicates that "gamification" is a highly promising technique to help people commit to eco-friendly goals. By turning carbon reduction into a competitive game involving digital currency, territory control, and visual rewards, the platform creates an exciting experience that draws users away from private vehicles and habituates them to a low-carbon lifestyle.</li>
          <li><strong>Quantifying Environmental Impact:</strong> The platform explicitly translates a user's physical effort into tangible environmental metrics, dynamically calculating exact kilograms of carbon saved and the equivalent number of trees planted. This immediate feedback loop reinforces the real-world value of their green travel.</li>
          <li><strong>Creating a Sustainable Loop:</strong> By integrating local merchants into the ecosystem (via map markers and discount vouchers), the platform ensures that green behavior is consistently rewarded. This sustains long-term engagement while simultaneously driving foot traffic to businesses that support sustainable initiatives.</li>
        </ul>
        <p>By turning the abstract concept of "carbon reduction" into an engaging, community-driven quest, EcoStride actively reduces localized traffic, lowers noise and air pollution, and creates a measurable environmental impact on campus and beyond.</p>
      </div>
    </main>
  );

  return (
    <div>
      <nav className="navbar">
        <div className="navbar-brand" onClick={() => setCurrentPage('home')}>EcoStride</div>
        <div className="navbar-nav">
          <a className="navbar-link" onClick={() => setCurrentPage('learn-more')}>Learn More</a>
          <a className="navbar-link" onClick={() => alert("Partnership page coming soon!")}>Partnership</a>
          <a className="navbar-link" onClick={() => alert("Contact Us page coming soon!")}>Contact Us</a>
        </div>
      </nav>

      {currentPage === 'home' ? renderHome() : renderLearnMore()}

      <footer>
        <p>&copy; {new Date().getFullYear()} EcoStride: Green Quest. All rights reserved.</p>
      </footer>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
